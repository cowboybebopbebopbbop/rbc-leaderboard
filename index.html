<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>РБК Крипто — Лидерборд репутации</title>
<style>
  :root {
    --bg: #0d1117; --card: #161b22; --line: #21262d;
    --text: #e6edf3; --muted: #8b949e; --gold: #f0b429; --accent: #2f81f7;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    padding: 24px 14px 60px;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 1.5rem; margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: .85rem; margin-bottom: 18px; }
  .search {
    width: 100%; padding: 11px 14px; margin-bottom: 14px;
    background: var(--card); border: 1px solid var(--line); border-radius: 10px;
    color: var(--text); font-size: 1rem; outline: none;
  }
  .search:focus { border-color: var(--accent); }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 11px 12px; border-bottom: 1px solid var(--line); }
  th { color: var(--muted); font-weight: 600; font-size: .78rem; text-transform: uppercase; letter-spacing: .04em; }
  td.rank { width: 56px; color: var(--muted); font-variant-numeric: tabular-nums; }
  td.rep { text-align: right; font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; }
  tr.top1 td.rank, tr.top2 td.rank, tr.top3 td.rank { font-size: 1.15rem; }
  tr.top1 td.rep { color: var(--gold); }
  .name { display: flex; align-items: center; gap: 8px; }
  .empty { text-align: center; color: var(--muted); padding: 40px 0; }
  footer { margin-top: 22px; color: var(--muted); font-size: .78rem; line-height: 1.5; }
  .dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:#3fb950; margin-right:6px; vertical-align: middle; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🏆 РБК Крипто — Лидерборд репутации</h1>
  <div class="sub" id="meta"><span class="dot"></span>загрузка…</div>

  <input class="search" id="search" type="search" placeholder="Поиск по имени…" autocomplete="off">

  <table>
    <thead><tr><th>#</th><th>Имя</th><th style="text-align:right">Репутация</th></tr></thead>
    <tbody id="rows"></tbody>
  </table>
  <div class="empty" id="empty" hidden>Пока пусто.</div>

  <footer>
    Рейтинг по данным реакций ChatKeeper. Обновляется автоматически.<br>
    Неофициальный фанатский лидерборд. Здесь только публичные имена и очки — ничего личного.
  </footer>
</div>

<script>
  const rowsEl = document.getElementById('rows');
  const metaEl = document.getElementById('meta');
  const emptyEl = document.getElementById('empty');
  const searchEl = document.getElementById('search');
  let DATA = [];

  const medal = r => r === 1 ? '🥇' : r === 2 ? '🥈' : r === 3 ? '🥉' : '';

  function render() {
    const q = searchEl.value.trim().toLowerCase();
    const list = q ? DATA.filter(x => (x.name || '').toLowerCase().includes(q)) : DATA;
    rowsEl.textContent = '';
    emptyEl.hidden = list.length > 0;
    for (const item of list) {
      const tr = document.createElement('tr');
      if (item.rank <= 3) tr.className = 'top' + item.rank;

      const rank = document.createElement('td');
      rank.className = 'rank';
      rank.textContent = medal(item.rank) || ('#' + item.rank);

      const name = document.createElement('td');
      const span = document.createElement('span');
      span.className = 'name';
      // textContent — имя НЕ интерпретируется как HTML (защита от инъекций)
      span.textContent = item.name || '—';
      name.appendChild(span);

      const rep = document.createElement('td');
      rep.className = 'rep';
      rep.textContent = item.reputation;

      tr.append(rank, name, rep);
      rowsEl.appendChild(tr);
    }
  }

  async function load() {
    try {
      const res = await fetch('leaderboard.json?t=' + Date.now());
      const json = await res.json();
      DATA = json.leaderboard || [];
      const d = json.updated ? new Date(json.updated) : null;
      metaEl.innerHTML = '<span class="dot"></span>';
      metaEl.append(document.createTextNode(
        `${json.count ?? DATA.length} участников · обновлено ${d ? d.toLocaleString('ru-RU') : '—'}`
      ));
      render();
    } catch (e) {
      metaEl.textContent = 'Не удалось загрузить данные.';
    }
  }

  searchEl.addEventListener('input', render);
  load();
  setInterval(load, 60000); // авто-обновление раз в минуту
</script>
</body>
</html>
